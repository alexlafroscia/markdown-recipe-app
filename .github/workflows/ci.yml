name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true
      - name: Install dependencies
        run: mise deps
      - name: Run tests
        run: mise run test

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true
      - name: Install dependencies
        run: mise deps
      - name: Run checks
        run: mise run check
